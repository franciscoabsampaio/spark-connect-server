name: Build Spark Images

on:
  push:
    branches: [ release ]

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate defaults
        run: |
          jq -e '
            group_by(.catalog)
            | all(
                ([ .[] | select(.default == true) ] | length) == 1
              )
          ' VERSIONS.json > /dev/null || {
            echo "Each catalog must have exactly one entry with default=true"
            exit 1
          }
      - name: Load matrix JSON and infer latest
        id: set-matrix
        run: |
          MATRIX_JSON=$(jq -c '
            def semver:
              split(".") | map(tonumber);

            def rank:
              [
                (.spark_version | semver[]),
                (.catalog_version | semver[]),
                (.scala_version | semver[]),
                (.java_version | tonumber)
              ];

            . as $all
            | map(
                . as $row
                | $row + {
                    default: (.default // false),
                    latest: (
                      $row == (
                        [ $all[] | select(.catalog == $row.catalog) ]
                        | max_by(rank)
                      )
                    )
                  }
              )
          ' VERSIONS.json)

          echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"

  build-test-push:
    needs: load-matrix
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read # Required to checkout code
      id-token: write # Required for OIDC signing (used by attestations)
      packages: write # Required to push to Docker Hub
      attestations: write # Required to attest build provenance
    services:
      docker:
        image: docker:20.10.24-dind
        options: --privileged
    strategy:
      matrix:
        include: ${{ fromJSON(needs.load-matrix.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create image ENV variable
        run: |
          IMAGE=${{ github.repository_owner }}/spark-connect-server:${{ matrix.catalog }}-${{ matrix.catalog_version }}-spark${{ matrix.spark_version }}-java${{ matrix.java_version }}-scala${{ matrix.scala_version }}
          echo "Building image: $IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -f base.Dockerfile \
            --build-arg CATALOG_VERSION=${{ matrix.catalog_version }} \
            --build-arg JAVA_VERSION=${{ matrix.java_version }} \
            --build-arg SCALA_VERSION=${{ matrix.scala_version }} \
            --build-arg SPARK_VERSION=${{ matrix.spark_version }} \
            -t spark-base .

          docker build ./${{ matrix.catalog }} \
            -t "${{ env.IMAGE }}"

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Test Docker image
        run: |
          pip install -r tests/requirements.txt
          pip install pyspark==${{ matrix.spark_version }}

          CATALOG=${{ matrix.catalog }} \
          CATALOG_VERSION=${{ matrix.catalog_version }} \
          JAVA_VERSION=${{ matrix.java_version }} \
          SCALA_VERSION=${{ matrix.scala_version }} \
          SPARK_VERSION=${{ matrix.spark_version }} \
            pytest -vs tests/

      - name: Tag selected image as catalog's default
        if: ${{ matrix.default }}
        run: |
          IMAGE_BASE=${{ github.repository_owner }}/spark-connect-server
          docker tag "${{ env.IMAGE }}" "${IMAGE_BASE}:${{ matrix.catalog }}"

      - name: Tag selected image as catalog's latest
        if: ${{ matrix.latest }}
        run: |
          IMAGE_BASE=${{ github.repository_owner }}/spark-connect-server
          docker tag "${{ env.IMAGE }}" "${IMAGE_BASE}:${{ matrix.catalog }}-latest"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push image with all tags
        run: |
          docker push --all-tags ${{ github.repository_owner }}/spark-connect-server

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ env.IMAGE }}" | cut -d'@' -f2)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Digest: $DIGEST"

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: index.docker.io/${{ github.repository_owner }}/spark-connect-server
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
